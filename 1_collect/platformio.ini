; ============================================================
; PlatformIO Configuration — XIAO ESP32S3 Sense
; Sketch: xiao_capture (Capture Dataset Sampah)
; ============================================================

; --- Environment utama: XIAO ESP32S3 Sense (board target final) ---
[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Aktifkan PSRAM (8MB onboard)
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM

; Monitor serial
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Partisi dengan SPIFFS support
board_build.partitions = default_8MB.csv

; Library dependencies
lib_deps =

; --- Environment testing: ESP32-S3 DevKitC (board test sementara) ---
[env:esp32s3_devkitc]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Aktifkan PSRAM
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM

; Monitor serial
monitor_speed = 115200

; Upload via USB serial (CH340/CP2102)
upload_speed = 921600
upload_port = /dev/cu.usbmodem5B3D0102921
monitor_port = /dev/cu.usbmodem5B3D0102921

; Library dependencies
lib_deps =
